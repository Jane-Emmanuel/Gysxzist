<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE FILL THE MISSING WORD</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧠 FILL THE MISSING WORD</h1>

<div id="hud">
<div id="coins">🪙 0</div>
<div id="level">Level 1</div>
</div>

<div id="combo">🔥 Combo x0</div>

<div id="emojiBox"></div>
<div id="questionBox"></div>
<div id="clueBox"></div>

<div id="slots"></div>
<div id="tiles"></div>

<div id="timerWrap"><div id="timerBar"></div></div>
<div id="hypeWrap"><div id="hypeBar"></div></div>

<button id="nextBtn">START / NEXT</button>
<button id="hintBtn">💡 HINT (Costs coins)</button>

<div id="status">🙂 Ready?</div>

<div id="saveMe" style="display:none;font-size:60px;">
😭 PLEASE SAVE ME!
</div>
<button id="saveBtn" style="display:none;">💰 SAVE ME (1000 coins)</button>

<div id="giftRow">💖 🌹 🎁 💎 ⭐</div>
<div id="chatBox"></div>

<div id="celebrate">🎉🥳🎊</div>
<div id="confetti"></div>
<div id="aliens"></div>

<div id="leaderboard">
<h3>🏆 Top Players</h3>
<ol id="scores"></ol>
</div>
